name: run

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: 10 16 * * *

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      # 关键：强制所有 Actions 使用 Node.js 24，直接消除警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5  # 升级到支持 Node 24 的 v5
      - uses: actions/setup-node@v5  # 升级到支持 Node 24 的 v5
        with:
          node-version: 20
      - run: npm ci
      - run: npm run main
        env:
          GLADOS: ${{ secrets.GLADOS }}
          NOTIFY: ${{ secrets.NOTIFY }}
